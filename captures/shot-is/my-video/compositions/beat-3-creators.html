    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Ken Burns: scale each image 1 → 1.04 over the full 4.1s (slow continuous drift)
      tl.to("#b3-img-1", { scale: 1.04, duration: 4.1, ease: "none" }, 0);
      tl.to("#b3-img-2", { scale: 1.04, duration: 4.1, ease: "none" }, 0);

      // Card 1 ASCENDS at t=0.1
      tl.from("#b3-card-1", { y: 120, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.1);
      // Card 2 ASCENDS at t=0.35
      tl.from("#b3-card-2", { y: 120, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.35);
      // Card 3 ASCENDS at t=0.6
      tl.from("#b3-card-3", { y: 120, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.6);

      // Name 1 PUNCHES IN: 0.25s after card-1 starts = t=0.35
      tl.from("#b3-name-1", { scale: 0.8, opacity: 0, duration: 0.2, ease: "power2.out" }, 0.35);
      // Descriptor 1: 0.15s after name-1 = t=0.5
      tl.from("#b3-desc-1", { opacity: 0, duration: 0.25, ease: "power1.out" }, 0.5);
      // Badge 1: 0.1s after descriptor-1 = t=0.65

      // Name 2 PUNCHES IN: 0.25s after card-2 starts = t=0.6

      // Descriptor 2: 0.15s after name-2 = t=0.75
      tl.from("#b3-desc-2", { opacity: 0, duration: 0.25, ease: "power1.out" }, 0.75);
      // Badge 2: 0.1s after descriptor-2 = t=0.9
      tl.from("#b3-badge-2", { opacity: 0, duration: 0.2, ease: "power1.out" }, 0.9);

      // Name 3 PUNCHES IN: 0.25s after card-3 starts = t=0.85
      tl.from("#b3-name-3", { scale: 0.8, opacity: 0, duration: 0.2, ease: "power2.out" }, 0.85);
      // Descriptor 3: 0.15s after name-3 = t=1.0
      tl.from("#b3-desc-3", { opacity: 0, duration: 0.25, ease: "power1.out" }, 1.0);
      // Badge 3: 0.1s after descriptor-3 = t=1.1
      tl.from("#b3-badge-3", { opacity: 0, duration: 0.2, ease: "power1.out" }, 1.1);
