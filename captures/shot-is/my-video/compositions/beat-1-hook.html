<template id="beat-1-hook-template">
  <div data-composition-id="beat-1" data-start="0" data-duration="3.0" data-width="1080" data-height="1920">

    <style>
      [data-composition-id="beat-1"] {
        position: relative;
        width: 1080px;
        height: 1920px;
        background: #000000;
        overflow: hidden;
      }

      /* ── Full-bleed hero video ── */
      [data-composition-id="beat-1"] .bg-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 1920px;
        object-fit: cover;
        z-index: 0;
        will-change: transform;
      }

      /* ── Particle canvas — screen blend over video ── */
      [data-composition-id="beat-1"] .particle-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 1920px;
        pointer-events: none;
        mix-blend-mode: screen;
        z-index: 1;
      }

      /* ── SHOT.IS logo — top-left ── */
      [data-composition-id="beat-1"] .logo-wrap {
        position: absolute;
        top: 0;
        left: 0;
        padding: 40px;
        z-index: 3;
      }

      [data-composition-id="beat-1"] .logo-text {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 32px;
        color: #FFFFFF;
        line-height: 1;
        letter-spacing: 2px;
      }

      /* ── Center content stack — vertically centered near 45% from top ── */
      [data-composition-id="beat-1"] .center-wrap {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        /* 45% of 1920 = 864px — content block starts above this */
        /* We use a flex column centered so the block lands around 45% */
        height: 1920px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        /* Shift center point upward: move the flex center to ~45% from top */
        padding-bottom: 192px; /* (50% - 45%) * 1920 = ~192px */
        box-sizing: border-box;
        z-index: 3;
        pointer-events: none;
      }

      /* ── Stat number ── */
      [data-composition-id="beat-1"] .stat-number {
        font-family: 'Syne', sans-serif;
        font-weight: 900;
        font-size: 200px;
        color: #FFFFFF;
        line-height: 1;
        letter-spacing: -4px;
        text-align: center;
        will-change: transform, filter, opacity;
      }

      /* ── Red underline SVG ── */
      [data-composition-id="beat-1"] .underline-wrap {
        width: 720px;
        height: 12px;
        margin-top: 16px;
        display: flex;
        align-items: center;
      }

      [data-composition-id="beat-1"] .underline-svg {
        width: 720px;
        height: 4px;
        display: block;
        overflow: visible;
      }

      [data-composition-id="beat-1"] .underline-path {
        stroke: #FF1100;
        stroke-width: 4;
        stroke-linecap: butt;
        stroke-dasharray: 720;
        stroke-dashoffset: 720;
        fill: none;
      }

      /* ── TOTAL REACH label ── */
      [data-composition-id="beat-1"] .reach-label {
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 36px;
        color: #E5E7EB;
        line-height: 1;
        letter-spacing: 6px;
        text-align: center;
        margin-top: 28px;
        will-change: opacity;
        /* Characters rendered individually for typing effect via spans */
      }

      [data-composition-id="beat-1"] .reach-char {
        display: inline-block;
        opacity: 0;
      }
    </style>

    <!-- Hero video background — NO data-start / data-track-index (visual bg, not clip) -->
    <video
      class="bg-video"
      src="../assets/videos/shot-hero-loop.mp4"
      poster="../assets/shot-hero-poster.webp"
      muted
      playsinline
      loop
      autoplay
    ></video>

    <!-- Particle canvas -->
    <canvas class="particle-canvas" id="b1-particles" width="1080" height="1920"></canvas>

    <!-- SHOT.IS logo — top-left -->
    <div class="logo-wrap">
      <span class="logo-text" id="b1-logo">SHOT.IS</span>
    </div>

    <!-- Center stat block -->
    <div class="center-wrap">
      <span class="stat-number" id="b1-stat">847M+</span>

      <div class="underline-wrap">
        <svg class="underline-svg" viewBox="0 0 720 4" preserveAspectRatio="none">
          <line class="underline-path" id="b1-line" x1="0" y1="2" x2="720" y2="2"/>
        </svg>
      </div>

      <div class="reach-label" id="b1-reach" aria-label="TOTAL REACH">
        <span class="reach-char">T</span><span class="reach-char">O</span><span class="reach-char">T</span><span class="reach-char">A</span><span class="reach-char">L</span><span class="reach-char">&nbsp;</span><span class="reach-char">R</span><span class="reach-char">E</span><span class="reach-char">A</span><span class="reach-char">C</span><span class="reach-char">H</span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {

        // ── Seeded PRNG — NO Math.random() ──
        function mulberry32(seed) {
          return function () {
            seed |= 0;
            seed = seed + 0x6D2B79F5 | 0;
            var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
            t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
          };
        }
        var rand = mulberry32(42);

        // ── Particle field setup ──
        var canvas = document.getElementById('b1-particles');
        var ctx = canvas.getContext('2d');
        var W = 1080, H = 1920;
        var CX = W / 2, CY = H / 2;
        var NUM_PARTICLES = 300;

        // Build deterministic particle array from seeded PRNG
        var particles = [];
        for (var i = 0; i < NUM_PARTICLES; i++) {
          var angle = rand() * Math.PI * 2;
          var radius = rand() * 420 + 60;        // spread distance: 60–480px
          var size   = rand() * 2.5 + 0.8;       // dot size: 0.8–3.3px
          var speed  = rand() * 0.4 + 0.6;       // relative speed 0.6–1.0
          particles.push({
            angle: angle,
            radius: radius,
            size: size,
            speed: speed,
            // These will be updated by the proxy
            progress: 0
          });
        }

        // progress 0 = fully dispersed outward (scatter)
        // progress 1 = fully coalesced at center
        // Animation: scatter → reconvene (0→1 over 3s, looping via finite repeat)
        function drawParticles(progress) {
          ctx.clearRect(0, 0, W, H);

          // Easing: ease-in-out on coalesce
          // p=0: dots at full radius; p=1: dots at center
          var eased = progress < 0.5
            ? 2 * progress * progress
            : 1 - Math.pow(-2 * progress + 2, 2) / 2;

          for (var j = 0; j < NUM_PARTICLES; j++) {
            var p = particles[j];
            var dist = p.radius * p.speed * (1 - eased);
            var px = CX + Math.cos(p.angle) * dist;
            var py = CY + Math.sin(p.angle) * dist;

            ctx.beginPath();
            ctx.arc(px, py, p.size, 0, Math.PI * 2);

            // Opacity: fully dispersed = faint; coalesced = bright
            var alpha = 0.15 + eased * 0.65;
            ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
            ctx.fill();
          }
        }

        // Initial draw (scattered)
        drawParticles(0);

        // ── Timeline ──
        window.__timelines = window.__timelines || {};
        var DURATION = 3.0;
        var cycleDuration = 1.2; // scatter→coalesce cycle length in seconds

        // Finite repeat count: how many full cycles fit in DURATION
        // We drive a single 0→1 proxy over DURATION; the cycle repeats internally
        var tl = gsap.timeline({ paused: true });

        // ── Particle driver: proxy animates 0→1 for the full duration ──
        // We simulate periodic coalescing by wrapping progress through [0,1] cycles
        var particleProxy = { raw: 0 };
        tl.to(particleProxy, {
          raw: DURATION,
          duration: DURATION,
          ease: 'none',
          onUpdate: function () {
            // Map raw time into repeating 0→1 cycle
            var cycleProgress = (particleProxy.raw % cycleDuration) / cycleDuration;
            drawParticles(cycleProgress);
          }
        }, 0);

        // ── Video slow zoom via gsap on the video element wrapper ──
        tl.fromTo('.bg-video', {
          scale: 1.0,
        }, {
          scale: 1.03,
          duration: DURATION,
          ease: 'none',
          transformOrigin: 'center center',
        }, 0);

        // ── SHOT.IS logo fades in at t=0.5, opacity 0→1 ──
        tl.from('#b1-logo', {
          opacity: 0,
          duration: 0.6,
          ease: 'sine.out',
        }, 0.5);

        // ── "847M+" SLAM at t=1.0: scale 0.6 + blur(30px) → scale 1 + blur(0) in 0.3s power4.out ──
        tl.fromTo('#b1-stat', {
          scale: 0.6,
          filter: 'blur(30px)',
          opacity: 0,
        }, {
          scale: 1,
          filter: 'blur(0px)',
          opacity: 1,
          duration: 0.3,
          ease: 'power4.out',
          transformOrigin: 'center center',
        }, 1.0);

        // ── Red underline draws left→right at t=1.25 ──
        tl.to('#b1-line', {
          strokeDashoffset: 0,
          duration: 0.45,
          ease: 'expo.out',
        }, 1.25);

        // ── "TOTAL REACH" character-by-character typing at t=1.4 ──
        var chars = document.querySelectorAll('[data-composition-id="beat-1"] .reach-char');
        tl.to(chars, {
          opacity: 1,
          duration: 0.05,
          stagger: 0.06,
          ease: 'none',
        }, 1.4);

        // No exit animations — hard cut to Beat 2

        window.__timelines['beat-1'] = tl;

      })();
    </script>

  </div>
</template>
