<template id="beat-7-cta-template">
  <div data-composition-id="beat-7" data-start="0" data-duration="3.0" data-width="1080" data-height="1920">

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&display=swap');

      [data-composition-id="beat-7"] {
        position: relative;
        width: 1080px;
        height: 1920px;
        background: #FF1100;
        overflow: hidden;
        font-family: 'Syne', sans-serif;
      }

      /* Particle canvas — behind all text */
      [data-composition-id="beat-7"] .b7-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 1920px;
        z-index: 1;
        pointer-events: none;
      }

      /* Main content column — vertically and horizontally centered */
      [data-composition-id="beat-7"] .b7-content {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 1920px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 100px 80px;
        box-sizing: border-box;
        gap: 0;
        z-index: 2;
      }

      /* SHOT.IS logo */
      [data-composition-id="beat-7"] .b7-logo {
        font-family: 'Syne', sans-serif;
        font-weight: 900;
        font-size: 130px;
        color: #ffffff;
        line-height: 1;
        letter-spacing: -0.02em;
        text-align: center;
        text-transform: uppercase;
        will-change: transform, filter, opacity;
      }

      /* Subtitle */
      [data-composition-id="beat-7"] .b7-subtitle {
        font-family: 'Syne', sans-serif;
        font-weight: 600;
        font-size: 28px;
        color: rgba(255, 255, 255, 0.7);
        text-align: center;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-top: 16px;
        will-change: transform, opacity;
      }

      /* SVG divider line */
      [data-composition-id="beat-7"] .b7-divider {
        width: 920px;
        height: 2px;
        display: block;
        margin-top: 48px;
        margin-bottom: 48px;
        flex-shrink: 0;
      }

      /* Apply for whitelist text */
      [data-composition-id="beat-7"] .b7-apply {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 52px;
        color: #ffffff;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        line-height: 1.1;
        min-height: 64px;
        will-change: opacity;
      }

      /* URL badge pill */
      [data-composition-id="beat-7"] .b7-badge {
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid rgba(255, 255, 255, 0.8);
        border-radius: 40px;
        padding: 16px 48px;
        margin-top: 60px;
        will-change: transform, opacity;
      }

      [data-composition-id="beat-7"] .b7-badge-text {
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 36px;
        color: #ffffff;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      /* Disclaimer */
      [data-composition-id="beat-7"] .b7-disclaimer {
        font-family: 'Syne', sans-serif;
        font-weight: 400;
        font-size: 22px;
        color: rgba(255, 255, 255, 0.6);
        text-align: center;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin-top: 56px;
        will-change: opacity;
      }

      /* Black fade overlay — top layer, initially invisible */
      [data-composition-id="beat-7"] .b7-fade-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 1920px;
        background: #000000;
        z-index: 100;
        pointer-events: none;
        opacity: 0;
      }
    </style>

    <!-- Particle canvas -->
    <canvas class="b7-canvas" width="1080" height="1920"></canvas>

    <!-- Main content -->
    <div class="b7-content">

      <!-- SHOT.IS logo — stamps in -->
      <div class="b7-logo">SHOT.IS</div>

      <!-- Subtitle -->
      <div class="b7-subtitle">Digital Content Studio</div>

      <!-- Horizontal divider drawn left to right -->
      <svg class="b7-divider" viewBox="0 0 920 2" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="1" x2="920" y2="1" stroke="#ffffff" stroke-width="2"/>
      </svg>

      <!-- Apply for whitelist — typed on character by character -->
      <div class="b7-apply"></div>

      <!-- URL badge pill -->
      <div class="b7-badge">
        <span class="b7-badge-text">SHOT.IS</span>
      </div>

      <!-- Disclaimer -->
      <div class="b7-disclaimer">Access is a privilege, not a right.</div>

    </div>

    <!-- Black fade overlay — fades in at the very end -->
    <div class="b7-fade-overlay"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};

      // ─── Seeded PRNG (mulberry32) — NO Math.random() ───────────────────────
      function mulberry32(seed) {
        return function() {
          seed |= 0;
          seed = seed + 0x6D2B79F5 | 0;
          var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
          t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
          return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
      }
      var rand = mulberry32(77);

      // ─── Pre-compute particle array ────────────────────────────────────────
      var PARTICLE_COUNT = 60;
      var particles = [];
      for (var i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x:  rand() * 1080,
          y:  rand() * 1920,
          vx: (rand() - 0.5) * 0.6,   // maps [-0.3 .. 0.3]
          vy: (rand() - 0.5) * 0.6,
          r:  2 + rand() * 1           // radius 2–3 px
        });
      }

      // ─── Canvas setup ──────────────────────────────────────────────────────
      var scope   = '[data-composition-id="beat-7"]';
      var canvas  = document.querySelector(scope + ' .b7-canvas');
      var ctx     = canvas ? canvas.getContext('2d') : null;

      // ─── GSAP timeline ─────────────────────────────────────────────────────
      var tl = gsap.timeline({ paused: true });

      // ── 1. Particle proxy (0→3.0s, ease:none) ────────────────────────────
      var proxy = { time: 0 };
      tl.to(proxy, {
        time: 3.0,
        duration: 3.0,
        ease: 'none',
        onUpdate: function() {
          if (!ctx) return;
          ctx.clearRect(0, 0, 1080, 1920);
          ctx.fillStyle = 'rgba(255,255,255,0.5)';
          for (var p = 0; p < PARTICLE_COUNT; p++) {
            var pt = particles[p];
            var nx = ((pt.x + pt.vx * proxy.time * 60) % 1080 + 1080) % 1080;
            var ny = ((pt.y + pt.vy * proxy.time * 60) % 1920 + 1920) % 1920;
            ctx.beginPath();
            ctx.arc(nx, ny, pt.r, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }, 0);

      // ── 2. SHOT.IS logo — stamp: scale:0.7+blur:24px → scale:1+blur:0, 0.3s power4.out at t=0.3
      tl.from(scope + ' .b7-logo', {
        scale: 0.7,
        filter: 'blur(24px)',
        opacity: 0,
        duration: 0.3,
        ease: 'power4.out'
      }, 0.3);

      // ── 3. Subtitle — y:20→0, opacity:0→1, 0.3s at t=0.65
      tl.from(scope + ' .b7-subtitle', {
        y: 20,
        opacity: 0,
        duration: 0.3,
        ease: 'power2.out'
      }, 0.65);

      // ── 4. SVG divider line — drawn left→right via scaleX at t=0.9
      tl.from(scope + ' .b7-divider', {
        scaleX: 0,
        transformOrigin: 'left center',
        duration: 0.3,
        ease: 'power2.out'
      }, 0.9);

      // ── 5. "APPLY FOR WHITELIST" — typed character-by-character at t=1.1
      var applyText   = 'APPLY FOR WHITELIST';
      var charDelay   = 0.035;
      for (var c = 0; c < applyText.length; c++) {
        (function(idx) {
          tl.call(function() {
            var el = document.querySelector(scope + ' .b7-apply');
            if (el) el.textContent = applyText.slice(0, idx + 1);
          }, null, 1.1 + idx * charDelay);
        })(c);
      }

      // ── 6. URL badge — y:40→0, opacity:0→1, 0.4s power2.out at t=1.8
      tl.set(scope + ' .b7-badge', { opacity: 0, y: 40 });
      tl.to(scope + ' .b7-badge', {
        y: 0,
        opacity: 1,
        duration: 0.4,
        ease: 'power2.out'
      }, 1.8);

      // Badge pulse: scale 1→1.04→1, 0.5s per half, repeat finite
      // Duration remaining after t=2.2: ~0.5s before exit at t=2.7
      // Full cycles that fit: Math.ceil(0.5 / 0.5) - 1 = 0 (just one in-out)
      tl.to(scope + ' .b7-badge', {
        scale: 1.04,
        duration: 0.25,
        ease: 'sine.inOut'
      }, 2.2);
      tl.to(scope + ' .b7-badge', {
        scale: 1,
        duration: 0.25,
        ease: 'sine.inOut'
      }, 2.45);
      tl.to(scope + ' .b7-badge', {
        scale: 1.04,
        duration: 0.25,
        ease: 'sine.inOut'
      }, 2.7);  // this overlaps with exit, scale pulse is visual accent only

      // ── 7. Disclaimer — fade in at t=2.2
      tl.from(scope + ' .b7-disclaimer', {
        opacity: 0,
        duration: 0.3,
        ease: 'power1.out'
      }, 2.2);

      // ── 8. FINAL SCENE EXIT: all content fades out + black overlay fades in at t=2.7
      tl.to(scope + ' .b7-content', {
        opacity: 0,
        duration: 0.3,
        ease: 'power2.in'
      }, 2.7);

      tl.to(scope + ' .b7-fade-overlay', {
        opacity: 1,
        duration: 0.3,
        ease: 'power2.in'
      }, 2.7);

      window.__timelines["beat-7"] = tl;
    </script>

  </div>
</template>
