<template id="beat-2-twist-template">
  <div data-composition-id="beat-2" data-width="1080" data-height="1920" data-start="0" data-duration="2.2">

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;900&display=swap');

      [data-composition-id="beat-2"] {
        position: relative;
        width: 1080px;
        height: 1920px;
        background: #000000;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      [data-composition-id="beat-2"] .grain-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 1920px;
        pointer-events: none;
        z-index: 1;
      }

      [data-composition-id="beat-2"] .content {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        /* Position content center around ~40% from top */
        margin-top: -192px; /* shift up so vertical center lands at ~40% of 1920 */
        gap: 0;
      }

      [data-composition-id="beat-2"] .zero-word {
        font-family: 'Syne', sans-serif;
        font-weight: 900;
        font-size: 220px;
        color: #FFFFFF;
        line-height: 1;
        letter-spacing: -4px;
        text-align: center;
        display: block;
        will-change: transform, color;
      }

      [data-composition-id="beat-2"] .divider-wrap {
        width: 1080px;
        height: 2px;
        margin-top: 32px;
        margin-bottom: 32px;
        display: flex;
        align-items: center;
        overflow: visible;
      }

      [data-composition-id="beat-2"] .divider-svg {
        width: 1080px;
        height: 2px;
        display: block;
      }

      [data-composition-id="beat-2"] .divider-line {
        stroke: #FFFFFF;
        stroke-width: 1;
        stroke-dasharray: 1080;
        stroke-dashoffset: 1080;
      }

      [data-composition-id="beat-2"] .tagline {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: center;
        justify-content: center;
        gap: 14px;
        overflow: visible;
      }

      [data-composition-id="beat-2"] .tagline-word {
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 58px;
        color: #E5E7EB;
        line-height: 1;
        letter-spacing: -0.5px;
        display: inline-block;
        will-change: transform, opacity;
      }
    </style>

    <!-- Grain noise canvas -->
    <canvas class="grain-canvas" width="1080" height="1920"></canvas>

    <!-- Main content -->
    <div class="content">
      <span class="zero-word" id="b2-zero">ZERO</span>

      <div class="divider-wrap">
        <svg class="divider-svg" viewBox="0 0 1080 1" preserveAspectRatio="none">
          <line class="divider-line" id="b2-line" x1="0" y1="0.5" x2="1080" y2="0.5"/>
        </svg>
      </div>

      <div class="tagline" id="b2-tagline">
        <span class="tagline-word" id="b2-w0">HUMAN</span>
        <span class="tagline-word" id="b2-w1">INFLUENCERS.</span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        // ── Seeded PRNG (mulberry32) — NO Math.random() ──
        function mulberry32(seed) {
          return function () {
            seed |= 0;
            seed = seed + 0x6D2B79F5 | 0;
            var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
            t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
          };
        }
        var rand = mulberry32(17);

        // ── Canvas grain noise ──
        var canvas = document.querySelector('[data-composition-id="beat-2"] .grain-canvas');
        var ctx = canvas.getContext('2d');
        var W = 1080, H = 1920;

        // Seeded hash for deterministic pixel noise
        function hash(x, y, t) {
          var n = x * 1619 + y * 31337 + t * 1013904223;
          n = (n ^ (n >>> 16)) * 0x45d9f3b;
          n = (n ^ (n >>> 16)) * 0x45d9f3b;
          n = n ^ (n >>> 16);
          return (n >>> 0) / 4294967296;
        }

        // Pre-generate noise tiles using the seeded rand for UV offsets
        var TILE_W = 256, TILE_H = 256;
        var NUM_TILES = 8;
        var tiles = [];
        for (var ti = 0; ti < NUM_TILES; ti++) {
          var imgData = ctx.createImageData(TILE_W, TILE_H);
          var d = imgData.data;
          for (var py = 0; py < TILE_H; py++) {
            for (var px = 0; px < TILE_W; px++) {
              var idx = (py * TILE_W + px) * 4;
              var v = Math.floor(hash(px, py, ti) * 256);
              d[idx]     = v;
              d[idx + 1] = v;
              d[idx + 2] = v;
              d[idx + 3] = Math.floor(0.03 * 255); // 3% opacity baked into alpha
            }
          }
          tiles.push(imgData);
        }

        var currentTile = 0;

        function drawFrame(t) {
          // Advance tile every ~6 frames at 60fps (≈0.1s)
          var tileIndex = Math.floor(t * 60 / 6) % NUM_TILES;
          ctx.clearRect(0, 0, W, H);

          // Tile the chosen noise image across the full canvas
          var tempCanvas = document.createElement('canvas');
          tempCanvas.width = TILE_W;
          tempCanvas.height = TILE_H;
          var tempCtx = tempCanvas.getContext('2d');
          tempCtx.putImageData(tiles[tileIndex], 0, 0);

          var pattern = ctx.createPattern(tempCanvas, 'repeat');
          ctx.fillStyle = pattern;
          ctx.fillRect(0, 0, W, H);
        }

        // Initial draw
        drawFrame(0);

        // ── Timeline ──
        window.__timelines = window.__timelines || {};
        var duration = 2.2;
        var tl = gsap.timeline({ paused: true });

        // Drive canvas grain via proxy
        var proxy = { time: 0 };
        tl.to(proxy, {
          time: duration,
          duration: duration,
          ease: 'none',
          onUpdate: function () {
            drawFrame(proxy.time);
          }
        }, 0);

        // ── "ZERO" drops in with elastic overshoot at t=0.1 ──
        tl.from('#b2-zero', {
          y: -60,
          duration: 0.65,
          ease: 'elastic.out(1, 0.55)',
        }, 0.1);

        // ── SVG line draws left→right via stroke-dashoffset at t=0.4, 0.35s ──
        tl.to('#b2-line', {
          strokeDashoffset: 0,
          duration: 0.35,
          ease: 'power2.inOut',
        }, 0.4);

        // ── "HUMAN INFLUENCERS." stagger in at t=0.5 ──
        tl.from('#b2-w0, #b2-w1', {
          x: 60,
          opacity: 0,
          duration: 0.25,
          ease: 'power2.out',
          stagger: 0.12,
        }, 0.5);

        // ── ZERO glitch at t=1.4 ──
        // Two 40ms jolts: x:4 → x:-4 → x:0, color flash #FF1100 on first jolt
        tl.to('#b2-zero', {
          x: 4,
          color: '#FF1100',
          duration: 0.04,
          ease: 'none',
          overwrite: 'auto',
        }, 1.4);

        tl.to('#b2-zero', {
          x: -4,
          color: '#FFFFFF',
          duration: 0.04,
          ease: 'none',
          overwrite: 'auto',
        }, 1.44);

        tl.to('#b2-zero', {
          x: 0,
          duration: 0.04,
          ease: 'none',
          overwrite: 'auto',
        }, 1.48);

        // No exit animations — hard cut handled externally

        window.__timelines['beat-2'] = tl;
      })();
    </script>

  </div>
</template>
