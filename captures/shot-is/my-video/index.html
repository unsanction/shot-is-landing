<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="22.0"
      data-width="1080"
      data-height="1920"
    >

      <!-- Narration (single audio track for entire video) -->
      <audio
        id="narration"
        src="narration.wav"
        data-start="0"
        data-duration="20.5"
        data-track-index="0"
        data-volume="1"
      ></audio>

      <!-- BEAT 1: Cold Open / Stat Hook (0.0–2.5s) -->
      <div
        id="beat-1"
        class="clip"
        data-composition-id="beat-1"
        data-composition-src="compositions/beat-1-hook.html"
        data-start="0"
        data-duration="2.5"
        data-width="1080"
        data-height="1920"
        data-track-index="1"
      ></div>

      <!-- BEAT 2: The Twist (2.5–4.5s) -->
      <div
        id="beat-2"
        class="clip"
        data-composition-id="beat-2"
        data-composition-src="compositions/beat-2-twist.html"
        data-start="2.5"
        data-duration="2.0"
        data-width="1080"
        data-height="1920"
        data-track-index="1"
      ></div>

      <!-- BEAT 3: The Product (4.5–8.6s) -->
      <div
        id="beat-3"
        class="clip"
        data-composition-id="beat-3"
        data-composition-src="compositions/beat-3-creators.html"
        data-start="4.5"
        data-duration="4.1"
        data-width="1080"
        data-height="1920"
        data-track-index="1"
      ></div>

      <!-- BEAT 4: The Proof (8.6–14.4s) -->
      <div
        id="beat-4"
        class="clip"
        data-composition-id="beat-4"
        data-composition-src="compositions/beat-4-proof.html"
        data-start="8.6"
        data-duration="5.8"
        data-width="1080"
        data-height="1920"
        data-track-index="1"
      ></div>

      <!-- BEAT 5: The Ethos (14.4–17.7s) -->
      <div
        id="beat-5"
        class="clip"
        data-composition-id="beat-5"
        data-composition-src="compositions/beat-5-ethos.html"
        data-start="14.4"
        data-duration="3.3"
        data-width="1080"
        data-height="1920"
        data-track-index="1"
      ></div>

      <!-- BEAT 6: The Power Statement (17.7–19.3s) -->
      <div
        id="beat-6"
        class="clip"
        data-composition-id="beat-6"
        data-composition-src="compositions/beat-6-viral.html"
        data-start="17.7"
        data-duration="1.6"
        data-width="1080"
        data-height="1920"
        data-track-index="1"
      ></div>

      <!-- BEAT 7: The CTA (19.3–22.0s) -->
      <div
        id="beat-7"
        class="clip"
        data-composition-id="beat-7"
        data-composition-src="compositions/beat-7-cta.html"
        data-start="19.3"
        data-duration="2.7"
        data-width="1080"
        data-height="1920"
        data-track-index="1"
      ></div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
